<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Rides</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background-color: lightgray;
        }

        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: black;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* Hero Section */
        .hero {
            height: 90vh;
            background:
                linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                url("https://images.unsplash.com/photo-1503376780353-7e6692767b70") no-repeat center/cover;
            text-align: center;
            padding-top: 100px;
            color: white;
        }

        .hero h1 {
            font-size: 2.5rem;
        }

        .btn {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            cursor: pointer;
        }

        .primary {
            background-color: black;
            color: white;
        }

        .secondary {
            background-color: white;
            border: 1px solid black;
        }

        .btn:hover {
            background-color: gray;
        }

        /* Models Section */
        .models {
            text-align: center;
            padding: 30px;
        }

        .model-list {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .model {
            padding: 20px;
            background-color: #eee;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 15px;
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h2>E-Rides</h2>
    <nav>
        <a href="#">Model S</a>
        <a href="#">Model 3</a>
        <a href="#">Model X</a>
        <a href="#">Model Y</a>
    </nav>
</header>

<section class="hero">
    <h1>Drive the Future</h1>
    <p>Simple. Electric. Powerful.</p>

    <button class="btn primary">Order Now</button>
    <button class="btn secondary">Learn More</button>
</section>

<section class="models">
    <h2>Our Models</h2>

    <div class="model-list">
        <div class="model">Model S</div>
        <div class="model">Model 3</div>
        <div class="model">Model X</div>
        <div class="model">Model Y</div>
    </div>
</section>

<footer>
    <p>© 2026 E-Rides</p>
</footer>

</body>
</html>
