<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Rides</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            position: fixed;
            width: 100%;
            background: rgba(0,0,0,0.5);
        }

        header h2 {
            color: white;
        }

        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: white;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* Hero Section (TESLA STYLE 🔥) */
        .hero {
            height: 100vh;
            background:
                linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
                url("https://images.unsplash.com/photo-1706740425990-02e7c5a2c3fd") no-repeat center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.2rem;
        }

        .buttons {
            margin-top: 20px;
        }

        .btn {
            padding: 12px 30px;
            margin: 10px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .primary {
            background-color: black;
            color: white;
        }

        .secondary {
            background-color: white;
            color: black;
        }

        .btn:hover {
            opacity: 0.8;
        }

        /* Models Section */
        .models {
            text-align: center;
            padding: 50px 20px;
        }

        .model-list {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .model {
            padding: 25px;
            background-color: #f2f2f2;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            background-color: black;
            color: white;
        }

        /* Responsive (bonus marks ⭐) */
        @media (max-width: 768px) {
            .model-list {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<header>
    <h2>E-Rides</h2>
    <nav>
        <a href="#">Model S</a>
        <a href="#">Model 3</a>
        <a href="#">Model X</a>
        <a href="#">Model Y</a>
    </nav>
</header>

<section class="hero">
    <h1>Drive the Future</h1>
    <p>Electric. Powerful. Simple.</p>

    <div class="buttons">
        <button class="btn primary">Order Now</button>
        <button class="btn secondary">Learn More</button>
    </div>
</section>

<section class="models">
    <h2>Our Models</h2>

    <div class="model-list">
        <div class="model">Model S</div>
        <div class="model">Model 3</div>
        <div class="model">Model X</div>
        <div class="model">Model Y</div>
    </div>
</section>

<footer>
    <p>© 2026 E-Rides</p>
</footer>

</body>
</html>
